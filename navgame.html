<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Navruz Game - Professional</title>
    <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: #2c3e50 url('bahoriy.jpg') center/cover no-repeat fixed;
            text-align: center;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
        }

        .home-container { position: fixed; top: 20px; left: 20px; z-index: 100; }

        .home-btn-fixed {
            background: rgba(231, 76, 60, 0.8);
            color: white;
            border: 2px solid #fff;
            width: 50px;
            height: 50px;
            border-radius: 12px;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .title {
            font-family: 'Silkscreen', cursive;
            font-size: 3em;
            color: white;
            margin: 20px 0;
            text-transform: uppercase;
            text-shadow: 4px 4px 0px #eb2e86;
            letter-spacing: 5px;
        }

        #info {
            margin-bottom: 25px;
            padding: 10px 40px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 50px;
            font-size: 1.3em;
            border: 2px solid #f8b4e8;
            backdrop-filter: blur(5px);
        }

        #game {
            display: grid;
            gap: 15px;
            perspective: 1000px;
            margin-bottom: 50px;
        }

        .card {
            width: 115px; 
            height: 155px;
            cursor: pointer;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card.flipped { transform: rotateY(180deg); }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }

        .card-back {
            background: #34495e url('gulli.jpg') center/cover no-repeat;
            border: 2px solid #ecf0f1;
        }

        .card-front {
            background: #fff;
            transform: rotateY(180deg);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #f1c40f;
            overflow: hidden;
        }

        .card-front img { width: 100%; height: 100%; object-fit: contain; }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: linear-gradient(135deg, #2c3e50, #000);
            padding: 40px;
            border: 3px solid #f8b4e8;
            border-radius: 25px;
            text-align: center;
            max-width: 400px;
        }

        .modal-btn {
            background: #f8b4e8;
            color: #000;
            border: none;
            padding: 12px 25px;
            font-family: 'Silkscreen';
            cursor: pointer;
            border-radius: 10px;
            margin: 10px;
        }

        .settings-panel {
            display: none;
            position: fixed;
            top: 80px;
            left: 20px;
            background: rgba(0, 0, 0, 0.9);
            padding: 20px;
            border-radius: 20px;
            border: 2px solid #f1c40f;
            z-index: 101;
        }

        .settings-btn-fixed { position: fixed; top: 20px; left: 85px; z-index: 100; background: rgba(52, 152, 219, 0.8); }

        @keyframes shake {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(5px, 5px); }
            50% { transform: translate(-5px, -5px); }
            75% { transform: translate(5px, -5px); }
        }

        @media (max-width: 600px) {
            .card { width: 75px; height: 105px; }
            .title { font-size: 1.8em; }
        }
    </style>
</head>
<body>

<div class="home-container">
    <a href="index.html#game" class="home-btn-fixed" style="text-decoration: none;">🏠</a>
</div>

<button class="home-btn-fixed settings-btn-fixed" onclick="toggleSettings()">⚙️</button>

<div class="title">Navruz Game</div>

<div id="info">
    <span id="labelLevel">Level</span>: <span id="level">1</span> | 
    <span id="labelTime">Vaqt</span>: <span id="timer">25</span>s | 
    <span id="labelLives">Jon</span>: <span id="lives">6</span>
    <span id="bomb-info" style="color: #e74c3c; display: none;"> 💣: <span id="bombsCount">0</span></span>
</div>

<div id="game"></div>

<div id="gameModal" class="modal">
    <div class="modal-content">
        <h2 id="modalTitle" style="color: #fff">G'ALABA!</h2>
        <p id="modalMsg" style="color: #fff">Keyingi bosqichga tayyormisiz?</p>
        <div class="btn-group">
            <button class="modal-btn" id="modalBtn">DAVOM ETISH</button>
            <button class="modal-btn" style="background: #e74c3c; color: #fff" onclick="window.location.href='index.html'">MENU</button>
        </div>
    </div>
</div>

<div class="settings-panel" id="settingsPanel">
    <div style="margin-bottom: 10px;">
        <span id="labelLang">Language</span>:
        <select id="langSelect" onchange="changeLang(this.value)">
            <option value="uz">UZB</option>
            <option value="ru">RUS</option>
            <option value="en">ENG</option>
        </select>
    </div>
    <div>Music: <button onclick="toggleMusic()" id="musicBtn">ON</button></div>
</div>

<audio id="bgMusic" loop src="east.m4a"></audio>
<audio id="clickSound" src="click.mp3"></audio>
<audio id="nextLevelSound" src="next level.mp3"></audio>
<audio id="gameOverSound" src="game over.mp3"></audio>
<audio id="bombSound" src="bombsound.mp3"></audio>

<script>
    const levelSettings = {
        1: { cards: 6, cols: 3, bombs: 0 },
        2: { cards: 8, cols: 4, bombs: 0 },
        3: { cards: 8, cols: 4, bombs: 0 },
        4: { cards: 10, cols: 5, bombs: 2 },
        5: { cards: 12, cols: 6, bombs: 2 },
        6: { cards: 14, cols: 7, bombs: 2 },
        7: { cards: 16, cols: 8, bombs: 2 },
        8: { cards: 16, cols: 8, bombs: 4 },
        9: { cards: 18, cols: 9, bombs: 4 },
        10: { cards: 20, cols: 10, bombs: 4 }
    };

    const images = ['chol.png', 'kampir.png', 'non.png', 'sumalak.png', 'sommy-removebg-preview.jpg', 'osh-removebg-preview.jpg', 'kok-removebg-preview.jpg', 'sumalak-removebg-preview.jpg'];
    let level = 1, lives = 6, timer = 25, interval, flippedCards = [], matchedCount = 0, isGameActive = true;
    let currentLang = 'uz', musicOn = true, sfxOn = true;

    const translations = {
        uz: { level: "Bosqich", time: "Vaqt", lives: "Jon", win: "G'ALABA!", loss: "O'YIN TUGADI", timeOut: "VAQT TUGADI", next: "DAVOM ETISH" },
        ru: { level: "Уровень", time: "Время", lives: "Жизни", win: "ПОБЕДА!", loss: "КОНЕЦ ИГРЫ", timeOut: "ВРЕМЯ ВЫШЛО", next: "ДАЛЕЕ" },
        en: { level: "Level", time: "Time", lives: "Lives", win: "VICTORY!", loss: "GAME OVER", timeOut: "TIME OUT", next: "CONTINUE" }
    };

    function startLevel() {
        const game = document.getElementById('game');
        game.innerHTML = '';
        flippedCards = [];
        matchedCount = 0;
        isGameActive = true;

        let currentSet = levelSettings[level] || levelSettings[10];
        game.style.gridTemplateColumns = `repeat(${currentSet.cols}, 1fr)`;

        // Bomba ko'rsatkichi
        const bombInfo = document.getElementById('bomb-info');
        if (currentSet.bombs > 0) {
            bombInfo.style.display = 'inline';
            document.getElementById('bombsCount').textContent = currentSet.bombs;
        } else {
            bombInfo.style.display = 'none';
        }

        let cardsData = [];
        let pairCount = Math.floor((currentSet.cards - currentSet.bombs) / 2);

        for (let i = 0; i < pairCount; i++) {
            let img = images[i % images.length];
            cardsData.push({type: 'normal', img}, {type: 'normal', img});
        }
        for (let i = 0; i < currentSet.bombs; i++) {
            cardsData.push({type: 'bomb', img: 'bomba.jpg'});
        }
        while (cardsData.length < currentSet.cards) {
            cardsData.push({type: 'bomb', img: 'bomba.jpg'});
        }

        cardsData.sort(() => Math.random() - 0.5);

        cardsData.forEach(data => {
            const card = document.createElement('div');
            card.className = 'card';
            card.dataset.type = data.type;
            card.innerHTML = `<div class="card-back"></div><div class="card-front"><img src="${data.img}"></div>`;
            card.onclick = flipCard;
            game.appendChild(card);
        });

        timer = 20 + (level * 2);
        document.getElementById('timer').textContent = timer;
        startTimer();
    }

    function flipCard() {
        if (!isGameActive || flippedCards.length === 2 || this.classList.contains('flipped')) return;

        if (this.dataset.type === 'bomb') {
            if (sfxOn) playSound('bombSound');
            document.body.style.animation = "shake 0.5s";
            setTimeout(() => document.body.style.animation = "", 500);
            
            lives--;
            document.getElementById('lives').textContent = lives;
            this.classList.add('flipped');

            if (lives <= 0) {
                showModal(translations[currentLang].loss, "Jonlaringiz tugadi!", "QAYTADAN", resetGame);
            } else {
                setTimeout(() => this.classList.remove('flipped'), 1000);
            }
            return;
        }

        if (sfxOn) playSound('clickSound');
        this.classList.add('flipped');
        flippedCards.push(this);

        if (flippedCards.length === 2) {
            const img1 = flippedCards[0].querySelector('img').src;
            const img2 = flippedCards[1].querySelector('img').src;

            if (img1 === img2) {
                matchedCount += 2;
                flippedCards = [];
                if (matchedCount === document.querySelectorAll('.card[data-type="normal"]').length) {
                    setTimeout(winLevel, 500);
                }
            } else {
                setTimeout(() => {
                    flippedCards.forEach(c => c.classList.remove('flipped'));
                    flippedCards = [];
                }, 800);
            }
        }
    }

    function winLevel() {
        clearInterval(interval);
        if (sfxOn) playSound('nextLevelSound');
        showModal(translations[currentLang].win, `${level}-bosqich tugadi!`, translations[currentLang].next, () => {
            level++;
            document.getElementById('level').textContent = level;
            startLevel();
        });
    }

    function showModal(title, msg, btnText, callback) {
        isGameActive = false;
        clearInterval(interval);
        const modal = document.getElementById('gameModal');
        document.getElementById('modalTitle').textContent = title;
        document.getElementById('modalMsg').textContent = msg;
        const btn = document.getElementById('modalBtn');
        btn.textContent = btnText;
        modal.style.display = 'flex';
        btn.onclick = () => {
            modal.style.display = 'none';
            callback();
        };
    }

    function playSound(id) {
        const s = document.getElementById(id);
        if (s) { s.currentTime = 0; s.play(); }
    }

    function startTimer() {
        clearInterval(interval);
        interval = setInterval(() => {
            if (!isGameActive) return;
            timer--;
            document.getElementById('timer').textContent = timer;
            if (timer <= 0) {
                clearInterval(interval);
                playSound('gameOverSound');
                showModal(translations[currentLang].timeOut, "Vaqt tugadi!", "QAYTADAN", resetGame);
            }
        }, 1000);
    }

    function resetGame() {
        level = 1; lives = 6;
        document.getElementById('level').textContent = level;
        document.getElementById('lives').textContent = lives;
        startLevel();
    }

    function toggleMusic() {
        musicOn = !musicOn;
        const m = document.getElementById('bgMusic');
        document.getElementById('musicBtn').textContent = musicOn ? "ON" : "OFF";
        musicOn ? m.play() : m.pause();
    }

    function toggleSettings() {
        const p = document.getElementById('settingsPanel');
        p.style.display = p.style.display === 'block' ? 'none' : 'block';
    }

    function changeLang(lang) {
        currentLang = lang;
        const t = translations[lang];
        document.getElementById('labelLevel').textContent = t.level;
        document.getElementById('labelTime').textContent = t.time;
        document.getElementById('labelLives').textContent = t.lives;
    }

    // Birinchi klikda musiqani yoqish
    window.addEventListener('click', () => {
        if(musicOn) document.getElementById('bgMusic').play();
    }, {once: true});

    startLevel();
</script>
</body>
</html>
